apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dependency-track
spec:
  hostnames:
    - dependency-track.localhost
  parentRefs:
    - kind: Gateway
      name: traefik-gateway
  rules:
    - backendRefs:
        - namespace: dependency-track
          name: dependency-track-frontend
          port: 8080
